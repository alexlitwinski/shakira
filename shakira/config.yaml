name: Shakira - Assistente WhatsApp
description: Assistente pessoal via WhatsApp para Home Assistant (Evolution API + Gemini)
version: "1.7.52"
slug: shakira
init: false
arch:
  - aarch64
  - amd64
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:whatsapp
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Webhook do Evolution API
map:
  - type: homeassistant_config
    read_only: false
options:
  ha_url: http://supervisor/core
  homeassistant_long_lived_token: ""
  evolution_base_url: ""
  evolution_api_key: ""
  gemini_api_key: ""
  evolution_instance: ""
  devices_config_path: /homeassistant/shakira_devices.yaml
  gemini_cache_ttl_hours: 24
  ha_states_cache_sec: 30
  photoprism_url: ""
  photoprism_token: ""
  photoprism_max_photos: 10
  photoprism_api_prefix: ""
  frigate_url: ""
  frigate_cameras_config_path: /homeassistant/shakira_cameras.yaml
  alerts_config_path: /homeassistant/shakira_alerts.yaml
  user_data_path: /homeassistant/shakira_users
  shakira_api_token: ""
  vault_master_key: ""
  apify_api_token: ""
  apify_instagram_actor: "apify/instagram-profile-scraper"
  instagram_links_fetch_enabled: true
  google_fact_check_api_key: ""
  fact_check_enabled: true
  log_level: info
schema:
  ha_url: url
  homeassistant_long_lived_token: password?
  evolution_base_url: str
  evolution_api_key: password
  gemini_api_key: password
  evolution_instance: str?
  devices_config_path: str?
  gemini_cache_ttl_hours: int(1,168)?
  ha_states_cache_sec: int(0,3600)?
  photoprism_url: str?
  photoprism_token: password?
  photoprism_max_photos: int(1,10)?
  photoprism_api_prefix: str?
  frigate_url: url?
  frigate_cameras_config_path: str?
  alerts_config_path: str?
  user_data_path: str?
  shakira_api_token: password?
  vault_master_key: password?
  apify_api_token: password?
  apify_instagram_actor: str?
  instagram_links_fetch_enabled: bool?
  google_fact_check_api_key: password?
  fact_check_enabled: bool?
  log_level: list(none|error|info|debug)?
